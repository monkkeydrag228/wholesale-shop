name: Deploy to AWS

"on":
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            if [ ! -d /home/ubuntu/wholesale-shop ]; then
              git clone https://github.com/monkkeydrag228/wholesale-shop.git /home/ubuntu/wholesale-shop
            fi
            cd /home/ubuntu/wholesale-shop
            git reset --hard HEAD
            git pull origin main
            echo ">>> Working dir: $(pwd)"
            echo ">>> dashboard.html brand: $(grep -o 'RETAKE\|DRAPE' frontend/admin/dashboard.html | head -1)"
            docker compose down -v
            docker compose build --no-cache
            docker compose up -d
            echo "✅ Deployment complete!"
