name: Deploy to AWS

"on":
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker rm -f wholesale_db wholesale_app wholesale_nginx 2>/dev/null || true
            cd ~/wholesale-shop 2>/dev/null || git clone https://github.com/monkkeydrag228/wholesale-shop.git ~/wholesale-shop && cd ~/wholesale-shop
            git pull origin main
            docker compose down -v 2>/dev/null || true
            docker compose up -d --build