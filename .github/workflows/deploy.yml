name: Deploy to AWS

"on":
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /home/ubuntu/wholesale-shop || (git clone https://github.com/monkkeydrag228/wholesale-shop.git /home/ubuntu/wholesale-shop && cd /home/ubuntu/wholesale-shop)
            git pull origin main
            docker compose down -v
            docker compose build --no-cache
            docker compose up -d
            echo "✅ Deployment complete!"