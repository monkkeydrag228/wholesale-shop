<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DRAPE CRM — Buyurtmalar</title>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">D</div>
      <div class="brand-text">DRAPE<span>Wholesale CRM</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">ASOSIY</div>
      <a href="dashboard.html" class="nav-item"><span class="ni">📊</span>Dashboard</a>
      <a href="orders.html"    class="nav-item active"><span class="ni">📋</span>Buyurtmalar</a>
      <a href="customers.html" class="nav-item"><span class="ni">👥</span>Mijozlar</a>
      <a href="products.html"  class="nav-item"><span class="ni">📦</span>Mahsulotlar</a>
      <a href="reports.html"   class="nav-item"><span class="ni">📈</span>Hisobotlar</a>
    </nav>
    <div class="sidebar-foot">
      <div class="avatar" id="avatarLetter">A</div>
      <div><div class="avatar-name" id="avatarName">Admin</div><div class="avatar-role">Administrator</div></div>
      <button onclick="logout()" style="margin-left:auto;background:none;border:none;color:#64748B;cursor:pointer;font-size:1rem">→</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div><div class="page-title">Buyurtmalar</div><div class="page-sub" id="countSub">Yuklanmoqda...</div></div>
      <div class="topbar-right">
        <div class="search-bar"><span>🔍</span><input id="searchInput" placeholder="Buyurtma raqami yoki mijoz nomi..."/></div>
        <select id="filterStatus" class="form-select" style="max-width:160px">
          <option value="">Barcha holatlar</option>
          <option value="pending">Kutilmoqda</option>
          <option value="processing">Jarayonda</option>
          <option value="shipped">Yuborildi</option>
          <option value="delivered">Yetkazildi</option>
          <option value="cancelled">Bekor qilindi</option>
        </select>
      </div>
    </div>
    <div class="content">
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>RAQAM</th><th>MIJOZ</th><th>MAHSULOTLAR</th><th>SUMMA</th><th>HOLAT</th><th>SANA</th><th>AMAL</th></tr>
            </thead>
            <tbody id="ordersBody"><tr><td colspan="7" class="empty-state">Yuklanmoqda...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const token=localStorage.getItem('drape_token');
if(!token) window.location.href='/admin/login.html';
const name=localStorage.getItem('drape_name')||'Admin';
document.getElementById('avatarName').textContent=name;
document.getElementById('avatarLetter').textContent=name[0].toUpperCase();
function logout(){localStorage.clear();window.location.href='/admin/login.html';}

let all=[];
function fmt(v){return '£'+parseFloat(v||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

const STATUS_UZ={pending:'Kutilmoqda',processing:'Jarayonda',shipped:'Yuborildi',delivered:'Yetkazildi',cancelled:'Bekor qilindi'};

async function load(){
  const r=await fetch('/api/orders',{headers:{'Authorization':'Bearer '+token}});
  all=await r.json();
  render();
}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const s=document.getElementById('filterStatus').value;
  let list=all.filter(o=>{
    if(q&&!String(o.id).includes(q)&&!(o.customer_name||'').toLowerCase().includes(q)) return false;
    if(s&&o.status!==s) return false;
    return true;
  });
  document.getElementById('countSub').textContent=list.length+' ta buyurtma';
  if(!list.length){document.getElementById('ordersBody').innerHTML='<tr><td colspan="7" class="empty-state">Buyurtma topilmadi</td></tr>';return;}
  document.getElementById('ordersBody').innerHTML=list.map(o=>`
    <tr>
      <td><span class="font-mono" style="color:#F97316;font-weight:600">#${o.id}</span></td>
      <td>
        <div style="font-weight:500">${o.customer_name||'—'}</div>
        ${o.customer_phone?`<div style="font-size:.72rem;color:#64748B">${o.customer_phone}</div>`:''}
      </td>
      <td style="color:#64748B">${o.items_count||'—'} ta</td>
      <td style="font-weight:600">${fmt(o.total_amount)}</td>
      <td>
        <select class="status-select ${o.status}" onchange="updateStatus(${o.id},this)">
          ${['pending','processing','shipped','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${STATUS_UZ[s]}</option>`).join('')}
        </select>
      </td>
      <td style="color:#64748B;font-size:.78rem">${new Date(o.created_at).toLocaleDateString('uz-UZ',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td>
        <button class="btn btn-danger btn-icon btn-sm" onclick="del(${o.id})" title="O'chirish">🗑️</button>
      </td>
    </tr>`).join('');
}

async function updateStatus(id, sel){
  const status=sel.value;
  sel.className='status-select '+status;
  await fetch(`/api/orders/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({status})});
}

async function del(id){
  if(!confirm('Buyurtmani o\'chirishni tasdiqlaysizmi?')) return;
  await fetch(`/api/orders/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  load();
}

document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('filterStatus').addEventListener('change',render);
load();
</script>
</body>
</html>
