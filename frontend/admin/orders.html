<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RETAKE CRM — Buyurtmalar</title>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">D</div>
      <div class="brand-text">RETAKE<span>Wholesale CRM</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">ASOSIY</div>
      <a href="dashboard.html" class="nav-item"><span class="ni">📊</span>Dashboard</a>
      <a href="orders.html"    class="nav-item active"><span class="ni">📋</span>Buyurtmalar</a>
      <a href="customers.html" class="nav-item"><span class="ni">👥</span>Mijozlar</a>
      <a href="products.html"  class="nav-item"><span class="ni">📦</span>Mahsulotlar</a>
      <a href="reports.html"   class="nav-item"><span class="ni">📈</span>Hisobotlar</a>
    </nav>
    <div class="sidebar-foot">
      <div class="avatar" id="avatarLetter">A</div>
      <div><div class="avatar-name" id="avatarName">Admin</div><div class="avatar-role">Administrator</div></div>
      <button onclick="logout()" style="margin-left:auto;background:none;border:none;color:#64748B;cursor:pointer;font-size:1rem">→</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div><div class="page-title">Buyurtmalar</div><div class="page-sub" id="countSub">Yuklanmoqda...</div></div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="loadOrders()">↻ Yangilash</button>
      </div>
    </div>
    <div class="content">
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Mijoz</th>
                <th>Summa</th>
                <th>Holat</th>
                <th>Sana</th>
                <th>Amal</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6" class="empty-state">Yuklanmoqda...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const token=localStorage.getItem('drape_token');
if(!token) window.location.href='/admin/login.html';
const name=localStorage.getItem('drape_name')||'Admin';
document.getElementById('avatarName').textContent=name;
document.getElementById('avatarLetter').textContent=name[0].toUpperCase();
function logout(){localStorage.clear();window.location.href='/admin/login.html';}

const STATUS_COLORS={pending:'#F59E0B',processing:'#3B82F6',shipped:'#8B5CF6',delivered:'#10B981',cancelled:'#EF4444'};
const STATUS_UZ={pending:'Kutilmoqda',processing:'Jarayonda',shipped:'Yuborildi',delivered:'Yetkazildi',cancelled:'Bekor qilindi'};

function fmt(v){return '£'+parseFloat(v||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

async function loadOrders(){
  try{
    const r=await fetch('/api/orders',{headers:{'Authorization':'Bearer '+token}});
    if(r.status===401){window.location.href='/admin/login.html';return;}
    const orders=await r.json();

    document.getElementById('countSub').textContent=orders.length+' buyurtma';
    document.getElementById('tableBody').innerHTML=orders.length?orders.map(o=>`
      <tr>
        <td class="font-mono" style="color:#F97316">#${o.id}</td>
        <td style="font-weight:500">${o.customer_name||'—'}</td>
        <td style="font-weight:600">${fmt(o.total_amount)}</td>
        <td><span class="badge ${o.status}" style="background:${STATUS_COLORS[o.status]}22;color:${STATUS_COLORS[o.status]}">${STATUS_UZ[o.status]||o.status}</span></td>
        <td class="text-muted">${new Date(o.created_at).toLocaleDateString('uz-UZ')}</td>
        <td>
          <select class="btn-edit" data-id="${o.id}" style="padding:.3rem .5rem;font-size:.76rem;cursor:pointer">
            <option value="">Holat o'zgartirish...</option>
            <option value="pending">Kutilmoqda</option>
            <option value="processing">Jarayonda</option>
            <option value="shipped">Yuborildi</option>
            <option value="delivered">Yetkazildi</option>
            <option value="cancelled">Bekor qilindi</option>
          </select>
        </td>
      </tr>`).join(''):`<tr><td colspan="6" class="empty-state">Buyurtmalar yo'q</td></tr>`;

    document.querySelectorAll('.btn-edit').forEach(sel=>{
      sel.addEventListener('change',async(e)=>{
        const status=e.target.value;
        if(!status) return;
        try{
          const res=await fetch(`/api/orders/${sel.dataset.id}/status`,{
            method:'PATCH',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
            body:JSON.stringify({status})
          });
          if(!res.ok) throw new Error();
          loadOrders();
        }catch(err){console.error(err);}
      });
    });
  }catch(e){console.error(e);}
}
loadOrders();
</script>
</body>
</html>
