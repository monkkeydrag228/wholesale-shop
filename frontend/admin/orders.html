<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRAPE — Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">DRAPE</div>
      <nav class="sidebar-nav">
        <a href="/admin" class="nav-link">📦 Products</a>
        <a href="/admin/orders.html" class="nav-link active">🧾 Orders</a>
        <a href="/" class="nav-link">🏪 View Shop</a>
      </nav>
      <div class="sidebar-foot">Admin Panel v1.0</div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Orders</h1>
          <p class="subtitle">All customer wholesale orders</p>
        </div>
        <span id="tableCount" class="count-badge">Loading…</span>
      </div>

      <div class="toast" id="toast"></div>

      <section class="table-card">
        <div id="tableLoading" class="loading-row">Loading orders…</div>
        <div id="tableError"   class="error-row" style="display:none">
          No orders yet. Place an order from the <a href="/">shop</a> first.
        </div>

        <div class="table-wrap">
          <table id="ordersTable" style="display:none">
            <thead>
              <tr>
                <th>#</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Total</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    'use strict';

    const tableBody    = document.getElementById('tableBody');
    const tableEl      = document.getElementById('ordersTable');
    const tableCount   = document.getElementById('tableCount');
    const tableLoading = document.getElementById('tableLoading');
    const tableError   = document.getElementById('tableError');
    const toast        = document.getElementById('toast');

    function showToast(msg, type = 'success') {
      toast.textContent = msg;
      toast.className   = `toast show ${type}`;
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    const STATUS_COLORS = {
      pending:    '#C8963E',
      processing: '#2980b9',
      shipped:    '#8e44ad',
      delivered:  '#27ae60',
      cancelled:  '#c0392b',
    };

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');
        if (!res.ok) throw new Error();
        const orders = await res.json();

        tableLoading.style.display = 'none';
        tableCount.textContent     = `${orders.length} orders`;
        tableBody.innerHTML        = '';   // ← очищаем перед рендером

        if (!orders.length) {
          tableError.style.display = 'block';
          tableEl.style.display    = 'none';
          return;
        }

        tableError.style.display = 'none';
        orders.forEach(o => tableBody.appendChild(createRow(o)));
        tableEl.style.display = 'table';
      } catch {
        tableLoading.style.display = 'none';
        tableError.style.display   = 'block';
      }
    }

    function createRow(o) {
      const tr   = document.createElement('tr');
      const date = new Date(o.created_at).toLocaleDateString('en-GB');
      const color = STATUS_COLORS[o.status] || '#888';

      tr.innerHTML = `
        <td><strong>#${o.id}</strong></td>
        <td>
          <div style="font-weight:500">${o.customer_name || 'Guest'}</div>
          <div style="font-size:.75rem;color:#888">${o.customer_phone || '—'}</div>
        </td>
        <td>
          <span style="background:${color}22;color:${color};padding:.2rem .6rem;
                border-radius:20px;font-size:.75rem;font-weight:500;text-transform:uppercase">
            ${o.status}
          </span>
        </td>
        <td><strong>£${parseFloat(o.total_amount).toFixed(2)}</strong></td>
        <td>${date}</td>
        <td class="actions-cell">
          <select class="btn-edit" data-id="${o.id}" style="padding:.3rem .5rem;font-size:.76rem;cursor:pointer">
            <option value="">Change status…</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </td>
      `;

      tr.querySelector('select').addEventListener('change', async (e) => {
        const status = e.target.value;
        if (!status) return;
        try {
          const res = await fetch(`/api/orders/${o.id}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
          });
          if (!res.ok) throw new Error();
          showToast(`✅ Order #${o.id} → ${status}`);
          loadOrders();
        } catch {
          showToast('❌ Could not update status', 'error');
        }
      });

      return tr;
    }

    loadOrders();
  </script>
</body>
</html>
