# nginx/nginx.conf
# Simulates an AWS Application Load Balancer (ALB)
# Routes all HTTP traffic to the upstream app service

upstream app_servers {
    # In docker-compose there is one instance.
    # In AWS, the ALB would list multiple EC2/ECS targets here.
    server app:3000;

    # With multiple instances you would add:
    # server app_2:3000;
    # server app_3:3000;
}

server {
    listen 80;
    server_name localhost;

    # Health check endpoint (ALB uses this to test target health)
    location /health {
        proxy_pass         http://app_servers/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # All other requests → app
    location / {
        proxy_pass         http://app_servers;
        proxy_http_version 1.1;

        # Forward real client IP (important for logging)
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Host             $host;

        # WebSocket support (optional but good practice)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
