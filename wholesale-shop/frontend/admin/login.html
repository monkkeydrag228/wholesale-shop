<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRAPE — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FDFAF5;
      color: #1C1C1C;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 1rem;
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      letter-spacing: .25em;
      text-align: center;
      margin-bottom: .4rem;
      color: #1C1C1C;
    }
    .login-sub {
      text-align: center;
      font-size: .78rem;
      color: #5A5A5A;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .login-card {
      background: #F5F0E8;
      border: 1px solid #E0D8CC;
      border-radius: 4px;
      padding: 2rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      margin-bottom: 1.2rem;
    }
    .form-group label {
      font-size: .75rem;
      font-weight: 500;
      color: #5A5A5A;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .form-group input {
      border: 1px solid #E0D8CC;
      background: #fff;
      padding: .65rem .85rem;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: #1C1C1C;
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus { border-color: #C8963E; }
    .btn-login {
      width: 100%;
      background: #1C1C1C;
      color: #fff;
      border: none;
      padding: .75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: background .2s;
      margin-top: .5rem;
    }
    .btn-login:hover { background: #C8963E; }
    .btn-login:disabled { background: #aaa; cursor: not-allowed; }
    .error-msg {
      background: rgba(192,57,43,.08);
      border: 1px solid rgba(192,57,43,.2);
      color: #c0392b;
      padding: .6rem .85rem;
      border-radius: 3px;
      font-size: .8rem;
      margin-top: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">DRAPE</div>
    <div class="login-sub">Wholesale Admin Panel</div>
    <div class="login-card">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-login" id="loginBtn">Sign In</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

<script>
  // If already logged in — go to admin
  if (localStorage.getItem('drape_token')) {
    window.location.href = '/admin/';
  }

  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const btn      = document.getElementById('loginBtn');
  const errorEl  = document.getElementById('errorMsg');

  async function doLogin() {
    const email    = emailEl.value.trim();
    const password = passEl.value;
    if (!email || !password) {
      showError('Please enter email and password.');
      return;
    }
    btn.disabled   = true;
    btn.textContent = 'Signing in…';
    errorEl.classList.remove('show');
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Invalid credentials.');
        return;
      }
      localStorage.setItem('drape_token', data.token);
      localStorage.setItem('drape_name',  data.name || 'Admin');
      window.location.href = '/admin/';
    } catch {
      showError('Could not connect to server.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('show');
  }

  btn.addEventListener('click', doLogin);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
